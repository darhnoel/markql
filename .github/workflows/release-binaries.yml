name: Release Desktop

on:
  push:
    tags: ["desktop-v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  BUILD_TYPE: MinSizeRel
  MARKQL_BUILD_CLI: "OFF"
  MARKQL_BUILD_AGENT: "ON"
  MARKQL_BUILD_TESTS: "OFF"
  MARKQL_BUILD_PYTHON: "OFF"
  MARKQL_WITH_ARROW: "OFF"
  MARKQL_OPTIMIZE_FOR_SIZE: "ON"
  MARKQL_STRIP_BINARIES: "ON"
  TAURI_LINUX_AYATANA_APPINDICATOR: "1"

jobs:
  build-agent-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Cache vcpkg installed tree
        uses: actions/cache@v4
        with:
          path: vcpkg_installed
          key: desktop-agent-vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}

      - name: Install vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg "${HOME}/vcpkg"
          "${HOME}/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
          echo "VCPKG_ROOT=${HOME}/vcpkg" >> "${GITHUB_ENV}"

      - name: Build markql-agent
        env:
          CMAKE_BUILD_TYPE: ${{ env.BUILD_TYPE }}
        run: ./scripts/build/build.sh

      - uses: actions/upload-artifact@v4
        with:
          name: markql-agent-linux
          path: build/markql-agent

  build-agent-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Cache vcpkg installed tree
        uses: actions/cache@v4
        with:
          path: vcpkg_installed
          key: desktop-agent-vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}

      - name: Install vcpkg
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg "$env:USERPROFILE\vcpkg"
          & "$env:USERPROFILE\vcpkg\bootstrap-vcpkg.bat" -disableMetrics
          Add-Content -Path $env:GITHUB_ENV -Value "VCPKG_ROOT=$env:USERPROFILE\vcpkg"

      - name: Build markql-agent
        shell: bash
        env:
          CMAKE_BUILD_TYPE: ${{ env.BUILD_TYPE }}
        run: ./scripts/build/build.sh

      - name: Locate markql-agent.exe
        shell: pwsh
        run: |
          $candidates = @(
            "build\MinSizeRel\markql-agent.exe",
            "build\Release\markql-agent.exe",
            "build\Debug\markql-agent.exe",
            "build\markql-agent.exe"
          )
          $found = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $found) {
            Write-Error "markql-agent.exe not found. Searched: $($candidates -join ', ')"
          }
          "AGENT_EXE=$found" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "Using agent artifact: $found"

      - uses: actions/upload-artifact@v4
        with:
          name: markql-agent-windows
          path: ${{ env.AGENT_EXE }}

  package-extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build extension zip
        run: |
          mkdir -p dist/markql-extension
          cp -R browser_plugin/extension/. dist/markql-extension/
          cd dist
          zip -r markql-extension.zip markql-extension

      - uses: actions/upload-artifact@v4
        with:
          name: markql-extension
          path: dist/markql-extension.zip

  build-desktop-linux:
    runs-on: ubuntu-22.04
    needs:
      - build-agent-linux
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            pkg-config \
            libgtk-3-dev \
            libxdo-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install AppImage tooling
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y libfuse2
          sudo curl -L -o /usr/local/bin/appimagetool \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          sudo chmod +x /usr/local/bin/appimagetool
          echo "APPIMAGE_EXTRACT_AND_RUN=1" >> "${GITHUB_ENV}"
          echo "APPIMAGETOOL=/usr/local/bin/appimagetool" >> "${GITHUB_ENV}"

      - name: Linux packaging preflight
        run: |
          set -euo pipefail
          command -v appimagetool
          [[ -x "${APPIMAGETOOL}" ]]
          echo "APPIMAGETOOL=${APPIMAGETOOL}"
          APPIMAGE_EXTRACT_AND_RUN=1 "${APPIMAGETOOL}" --version
          pkg-config --exists ayatana-appindicator3-0.1
          pkg-config --modversion ayatana-appindicator3-0.1
          [[ -f desktop/tauri.conf.json ]]
          [[ -f desktop/icons/icon.png ]]
          [[ -f desktop/icons/icon.ico ]]

      - name: Export pkg-config search path
        run: echo "PKG_CONFIG_PATH=/usr/lib/x86_64-linux-gnu/pkgconfig:/usr/share/pkgconfig" >> "${GITHUB_ENV}"

      - uses: actions/download-artifact@v4
        with:
          name: markql-agent-linux
          path: /tmp/markql-agent-linux

      - name: Prepare Linux sidecar
        run: |
          mkdir -p desktop/binaries dist
          cp /tmp/markql-agent-linux/markql-agent desktop/binaries/markql-agent-x86_64-unknown-linux-gnu
          chmod +x desktop/binaries/markql-agent-x86_64-unknown-linux-gnu

      - name: Verify Linux sidecar staging
        run: |
          set -euo pipefail
          [[ -x desktop/binaries/markql-agent-x86_64-unknown-linux-gnu ]]

      - uses: tauri-apps/tauri-action@v0
        with:
          projectPath: desktop
          args: --bundles appimage --verbose

      - name: Finalize Linux AppImage
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#desktop-v}"
          BUNDLE_DIR="desktop/target/release/bundle/appimage"
          echo "APPIMAGETOOL=${APPIMAGETOOL}"
          APPIMAGE_EXTRACT_AND_RUN=1 "${APPIMAGETOOL}" --version
          echo "Listing ${BUNDLE_DIR} before fallback:"
          ls -la "${BUNDLE_DIR}" || true
          find "${BUNDLE_DIR}" -maxdepth 3 -print || true
          mkdir -p dist
          APPIMAGE="$(find "${BUNDLE_DIR}" -type f -name '*.AppImage' | head -n 1 || true)"
          if [[ -z "${APPIMAGE}" ]]; then
            APPDIR="$(find "${BUNDLE_DIR}" -maxdepth 2 -type d -name '*.AppDir' | head -n 1 || true)"
            if [[ -z "${APPDIR}" ]]; then
              echo "ERROR: No .AppImage and no .AppDir were produced in ${BUNDLE_DIR}." >&2
              exit 1
            fi
            # Ensure a .desktop file exists at AppDir root (appimagetool requirement)
            DESKTOP_FILE="$(find "${APPDIR}" -maxdepth 1 -name '*.desktop' | head -n 1 || true)"
            if [[ -z "${DESKTOP_FILE}" ]]; then
              echo "No .desktop file found in ${APPDIR}, creating one."
              EXEC_NAME="$(find "${APPDIR}/usr/bin" -type f | head -n 1 | xargs basename || echo 'markql-desktop')"
              cat > "${APPDIR}/markql-desktop.desktop" <<DEOF
[Desktop Entry]
Name=MarkQL Desktop
Exec=${EXEC_NAME}
Icon=icon
Type=Application
Categories=Utility;
DEOF
              echo "Desktop file created at ${APPDIR}/markql-desktop.desktop"
            fi
            FALLBACK_APPIMAGE="${BUNDLE_DIR}/MarkQL-Desktop-${VERSION}-x86_64.AppImage"
            echo "Tauri produced only AppDir, running manual appimagetool fallback."
            printf 'Fallback command: ARCH=x86_64 APPIMAGE_EXTRACT_AND_RUN=1 %q --verbose %q %q\n' \
              "${APPIMAGETOOL}" "${APPDIR}" "${FALLBACK_APPIMAGE}"
            ARCH=x86_64 APPIMAGE_EXTRACT_AND_RUN=1 "${APPIMAGETOOL}" --verbose "${APPDIR}" "${FALLBACK_APPIMAGE}"
            echo "Listing ${BUNDLE_DIR} after fallback:"
            ls -la "${BUNDLE_DIR}" || true
            find "${BUNDLE_DIR}" -maxdepth 3 -print || true
            if [[ ! -f "${FALLBACK_APPIMAGE}" ]]; then
              echo "ERROR: appimagetool fallback did not produce ${FALLBACK_APPIMAGE}." >&2
              exit 1
            fi
            APPIMAGE="${FALLBACK_APPIMAGE}"
          fi
          cp "${APPIMAGE}" "dist/MarkQL-Desktop-${VERSION}-linux-x86_64.AppImage"

      - uses: actions/upload-artifact@v4
        with:
          name: markql-desktop-linux
          path: dist/MarkQL-Desktop-*.AppImage

  build-desktop-windows:
    runs-on: windows-latest
    needs:
      - build-agent-windows
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - uses: actions/download-artifact@v4
        with:
          name: markql-agent-windows
          path: C:\temp\markql-agent-windows

      - name: Windows packaging preflight
        shell: pwsh
        run: |
          if (!(Test-Path "desktop/icons/icon.ico")) {
            Write-Error "desktop/icons/icon.ico is required for Windows MSI bundling."
          }
          if (!(Test-Path "desktop/icons/icon.png")) {
            Write-Error "desktop/icons/icon.png is required for desktop bundling."
          }
          if (!(Test-Path "desktop/tauri.conf.json")) {
            Write-Error "desktop/tauri.conf.json is missing."
          }

      - name: Prepare Windows sidecar
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path desktop\binaries | Out-Null
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $candidates = @(
            "C:\temp\markql-agent-windows\markql-agent.exe",
            "C:\temp\markql-agent-windows\MinSizeRel\markql-agent.exe",
            "C:\temp\markql-agent-windows\Release\markql-agent.exe",
            "C:\temp\markql-agent-windows\Debug\markql-agent.exe"
          )
          $found = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $found) {
            Write-Error "Downloaded markql-agent.exe not found. Searched: $($candidates -join ', ')"
          }
          Copy-Item $found desktop\binaries\markql-agent-x86_64-pc-windows-msvc.exe

      - name: Verify Windows sidecar staging
        shell: pwsh
        run: |
          if (!(Test-Path "desktop/binaries/markql-agent-x86_64-pc-windows-msvc.exe")) {
            Write-Error "Expected staged Windows sidecar desktop/binaries/markql-agent-x86_64-pc-windows-msvc.exe"
          }

      - uses: tauri-apps/tauri-action@v0
        with:
          projectPath: desktop
          args: --bundles msi

      - name: Rename MSI asset
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^desktop-v', ''
          $msi = Get-ChildItem desktop\target\release\bundle\msi\*.msi | Select-Object -First 1
          if (-not $msi) {
            Write-Error "No MSI was produced in desktop\\target\\release\\bundle\\msi"
          }
          Copy-Item $msi.FullName "dist\MarkQL-Desktop-$version-windows-x86_64.msi"

      - uses: actions/upload-artifact@v4
        with:
          name: markql-desktop-windows
          path: dist/MarkQL-Desktop-*.msi

  publish:
    needs:
      - build-desktop-linux
      - build-desktop-windows
      - package-extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            dist/*.AppImage
            dist/*.msi
            dist/*.zip
