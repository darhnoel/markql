name: Release Desktop

on:
  push:
    tags: ["desktop-v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  BUILD_TYPE: MinSizeRel
  MARKQL_BUILD_CLI: "OFF"
  MARKQL_BUILD_AGENT: "ON"
  MARKQL_BUILD_TESTS: "OFF"
  MARKQL_BUILD_PYTHON: "OFF"
  MARKQL_WITH_ARROW: "OFF"
  MARKQL_OPTIMIZE_FOR_SIZE: "ON"
  MARKQL_STRIP_BINARIES: "ON"

jobs:
  build-agent-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Cache vcpkg installed tree
        uses: actions/cache@v4
        with:
          path: vcpkg_installed
          key: desktop-agent-vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}

      - name: Install vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg "${HOME}/vcpkg"
          "${HOME}/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
          echo "VCPKG_ROOT=${HOME}/vcpkg" >> "${GITHUB_ENV}"

      - name: Build markql-agent
        env:
          CMAKE_BUILD_TYPE: ${{ env.BUILD_TYPE }}
        run: ./scripts/build/build.sh

      - uses: actions/upload-artifact@v4
        with:
          name: markql-agent-linux
          path: build/markql-agent

  build-agent-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Cache vcpkg installed tree
        uses: actions/cache@v4
        with:
          path: vcpkg_installed
          key: desktop-agent-vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}

      - name: Install vcpkg
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg "$env:USERPROFILE\vcpkg"
          & "$env:USERPROFILE\vcpkg\bootstrap-vcpkg.bat" -disableMetrics
          Add-Content -Path $env:GITHUB_ENV -Value "VCPKG_ROOT=$env:USERPROFILE\vcpkg"

      - name: Build markql-agent
        shell: bash
        env:
          CMAKE_BUILD_TYPE: ${{ env.BUILD_TYPE }}
        run: ./scripts/build/build.sh

      - name: Locate markql-agent.exe
        shell: pwsh
        run: |
          $candidates = @(
            "build\MinSizeRel\markql-agent.exe",
            "build\Release\markql-agent.exe",
            "build\Debug\markql-agent.exe",
            "build\markql-agent.exe"
          )
          $found = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $found) {
            Write-Error "markql-agent.exe not found. Searched: $($candidates -join ', ')"
          }
          "AGENT_EXE=$found" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "Using agent artifact: $found"

      - uses: actions/upload-artifact@v4
        with:
          name: markql-agent-windows
          path: ${{ env.AGENT_EXE }}

  package-extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build extension zip
        run: |
          mkdir -p dist/markql-extension
          cp -R browser_plugin/extension/. dist/markql-extension/
          cd dist
          zip -r markql-extension.zip markql-extension

      - uses: actions/upload-artifact@v4
        with:
          name: markql-extension
          path: dist/markql-extension.zip

  build-desktop-linux:
    runs-on: ubuntu-22.04
    needs:
      - build-agent-linux
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            pkg-config \
            libgtk-3-dev \
            libxdo-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install AppImage tooling
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y libfuse2
          sudo curl -L -o /usr/local/bin/appimagetool \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          sudo chmod +x /usr/local/bin/appimagetool
          echo "APPIMAGE_EXTRACT_AND_RUN=1" >> "${GITHUB_ENV}"
          APPIMAGE_EXTRACT_AND_RUN=1 /usr/local/bin/appimagetool --version || true

      - name: Export pkg-config search path
        run: echo "PKG_CONFIG_PATH=/usr/lib/x86_64-linux-gnu/pkgconfig:/usr/share/pkgconfig" >> "${GITHUB_ENV}"

      - uses: actions/download-artifact@v4
        with:
          name: markql-agent-linux
          path: /tmp/markql-agent-linux

      - name: Prepare Linux sidecar
        run: |
          mkdir -p desktop/binaries dist
          cp /tmp/markql-agent-linux/markql-agent desktop/binaries/markql-agent-x86_64-unknown-linux-gnu
          chmod +x desktop/binaries/markql-agent-x86_64-unknown-linux-gnu

      - uses: tauri-apps/tauri-action@v0
        with:
          projectPath: desktop
          args: --bundles appimage --verbose

      - name: Rename AppImage asset
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#desktop-v}"
          echo "Listing desktop/target/release/bundle/appimage:"
          ls -la desktop/target/release/bundle/appimage || true
          find desktop/target/release/bundle/appimage -maxdepth 2 -print || true
          mkdir -p dist
          APPIMAGE="$(find desktop/target/release/bundle/appimage -maxdepth 1 -type f -name '*.AppImage' | head -n 1 || true)"
          if [[ -z "${APPIMAGE}" ]]; then
            echo "ERROR: No .AppImage produced in desktop/target/release/bundle/appimage." >&2
            exit 1
          fi
          cp "${APPIMAGE}" "dist/MarkQL-Desktop-${VERSION}-linux-x86_64.AppImage"

      - uses: actions/upload-artifact@v4
        with:
          name: markql-desktop-linux
          path: dist/MarkQL-Desktop-*.AppImage

  build-desktop-windows:
    runs-on: windows-latest
    needs:
      - build-agent-windows
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - uses: actions/download-artifact@v4
        with:
          name: markql-agent-windows
          path: C:\temp\markql-agent-windows

      - name: Prepare Windows sidecar
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path desktop\binaries | Out-Null
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $candidates = @(
            "C:\temp\markql-agent-windows\markql-agent.exe",
            "C:\temp\markql-agent-windows\MinSizeRel\markql-agent.exe",
            "C:\temp\markql-agent-windows\Release\markql-agent.exe",
            "C:\temp\markql-agent-windows\Debug\markql-agent.exe"
          )
          $found = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $found) {
            Write-Error "Downloaded markql-agent.exe not found. Searched: $($candidates -join ', ')"
          }
          Copy-Item $found desktop\binaries\markql-agent-x86_64-pc-windows-msvc.exe

      - uses: tauri-apps/tauri-action@v0
        with:
          projectPath: desktop
          args: --bundles msi

      - name: Rename MSI asset
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^desktop-v', ''
          $msi = Get-ChildItem desktop\target\release\bundle\msi\*.msi | Select-Object -First 1
          Copy-Item $msi.FullName "dist\MarkQL-Desktop-$version-windows-x86_64.msi"

      - uses: actions/upload-artifact@v4
        with:
          name: markql-desktop-windows
          path: dist/MarkQL-Desktop-*.msi

  publish:
    needs:
      - build-desktop-linux
      - build-desktop-windows
      - package-extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            dist/*.AppImage
            dist/*.msi
            dist/*.zip
