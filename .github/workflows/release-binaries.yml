name: Release Desktop

on:
  push:
    tags: ["desktop-v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  BUILD_TYPE: MinSizeRel
  MARKQL_BUILD_CLI: "OFF"
  MARKQL_BUILD_AGENT: "ON"
  MARKQL_BUILD_TESTS: "OFF"
  MARKQL_BUILD_PYTHON: "OFF"
  MARKQL_WITH_ARROW: "OFF"
  MARKQL_OPTIMIZE_FOR_SIZE: "ON"
  MARKQL_STRIP_BINARIES: "ON"

jobs:
  build-agent-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Cache vcpkg installed tree
        uses: actions/cache@v4
        with:
          path: vcpkg_installed
          key: desktop-agent-vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}

      - name: Install vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg "${HOME}/vcpkg"
          "${HOME}/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
          echo "VCPKG_ROOT=${HOME}/vcpkg" >> "${GITHUB_ENV}"

      - name: Build markql-agent
        env:
          CMAKE_BUILD_TYPE: ${{ env.BUILD_TYPE }}
        run: ./scripts/build/build.sh

      - uses: actions/upload-artifact@v4
        with:
          name: markql-agent-linux
          path: build/markql-agent

  build-agent-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache vcpkg installed tree
        uses: actions/cache@v4
        with:
          path: vcpkg_installed
          key: desktop-agent-vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}

      - name: Install vcpkg
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg "$env:USERPROFILE\vcpkg"
          & "$env:USERPROFILE\vcpkg\bootstrap-vcpkg.bat" -disableMetrics
          Add-Content -Path $env:GITHUB_ENV -Value "VCPKG_ROOT=$env:USERPROFILE\vcpkg"

      - name: Build markql-agent
        shell: bash
        env:
          CMAKE_BUILD_TYPE: ${{ env.BUILD_TYPE }}
        run: ./scripts/build/build.sh

      - uses: actions/upload-artifact@v4
        with:
          name: markql-agent-windows
          path: build/markql-agent.exe

  package-extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build extension zip
        run: |
          mkdir -p dist/markql-extension
          cp -R browser_plugin/extension/. dist/markql-extension/
          cd dist
          zip -r markql-extension.zip markql-extension

      - uses: actions/upload-artifact@v4
        with:
          name: markql-extension
          path: dist/markql-extension.zip

  build-desktop-linux:
    runs-on: ubuntu-22.04
    needs:
      - build-agent-linux
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: markql-agent-linux
          path: /tmp/markql-agent-linux

      - name: Prepare Linux sidecar
        run: |
          mkdir -p desktop/binaries dist
          cp /tmp/markql-agent-linux/markql-agent desktop/binaries/markql-agent-x86_64-unknown-linux-gnu
          chmod +x desktop/binaries/markql-agent-x86_64-unknown-linux-gnu

      - uses: tauri-apps/tauri-action@v0
        with:
          projectPath: desktop
          args: --bundles appimage

      - name: Rename AppImage asset
        run: |
          VERSION="${GITHUB_REF_NAME#desktop-v}"
          APPIMAGE="$(find desktop/target/release/bundle/appimage -maxdepth 1 -name '*.AppImage' | head -n 1)"
          cp "${APPIMAGE}" "dist/MarkQL-Desktop-${VERSION}-linux-x86_64.AppImage"

      - uses: actions/upload-artifact@v4
        with:
          name: markql-desktop-linux
          path: dist/MarkQL-Desktop-*.AppImage

  build-desktop-windows:
    runs-on: windows-latest
    needs:
      - build-agent-windows
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: markql-agent-windows
          path: C:\temp\markql-agent-windows

      - name: Prepare Windows sidecar
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path desktop\binaries | Out-Null
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item C:\temp\markql-agent-windows\markql-agent.exe desktop\binaries\markql-agent-x86_64-pc-windows-msvc.exe

      - uses: tauri-apps/tauri-action@v0
        with:
          projectPath: desktop
          args: --bundles msi

      - name: Rename MSI asset
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^desktop-v', ''
          $msi = Get-ChildItem desktop\target\release\bundle\msi\*.msi | Select-Object -First 1
          Copy-Item $msi.FullName "dist\MarkQL-Desktop-$version-windows-x86_64.msi"

      - uses: actions/upload-artifact@v4
        with:
          name: markql-desktop-windows
          path: dist/MarkQL-Desktop-*.msi

  publish:
    needs:
      - build-desktop-linux
      - build-desktop-windows
      - package-extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            dist/*.AppImage
            dist/*.msi
            dist/*.zip
